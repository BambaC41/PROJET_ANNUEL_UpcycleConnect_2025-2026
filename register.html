<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inscription — UpcycleConnect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
<header class="navbar">
  <div class="logo">
    <a href="index.html"><img src="logo.png" alt="UpcycleConnect Logo"></a>
  </div>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="#">Annonces</a>
    <a href="#">Prestations</a>
    <a href="#">Événements</a>
    <a href="#">Conseils</a>
  </nav>

  <div class="auth-buttons" id="authButtons">
    <a class="btn-outline" href="login.html">Connexion</a>
    <a class="btn-primary" href="register.html">S'inscrire</a>
  </div>

  <div class="user-box hidden" id="userBox">
    <span id="userHello"></span>
    <button class="btn-outline" id="logoutBtn">Déconnexion</button>
  </div>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1>Inscription</h1>
    <p class="muted">Créez un compte en 1 minute.</p>

    <form id="registerForm" class="auth-form">
      <div class="grid-2">
  <div class="form-group">
    <label for="firstName">Prénom</label>
    <input type="text" id="firstName" required>
  </div>

  <div class="form-group">
    <label for="lastName">Nom</label>
    <input type="text" id="lastName" required>
  </div>
</div>


      <label>Email</label>
      <input type="email" id="email" required>

      <label>Type de compte</label>
      <select id="role">
        <option value="particulier">Particulier</option>
        <option value="professionnel">Professionnel / Artisan</option>
        <option value="salarie">Salarié</option>
      </select>

      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Min 8 caractères + 1 chiffre" required>

      <label>Confirmer le mot de passe</label>
      <input type="password" id="password2" required>

      <button class="btn-primary" type="submit">Créer mon compte</button>

      <p class="muted small">
        Déjà un compte ?
        <a href="login.html">Se connecter</a>
      </p>

      <p class="error" id="errorMsg" aria-live="polite"></p>
    </form>
  </section>
</main>

<script src="auth.js"></script>
<script>
  // Si déjà connecté, retour accueil
  if (window.UC_AUTH.getAuthUser()) {
    window.location.href = "index.html";
  }

  document.getElementById("registerForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const error = document.getElementById("errorMsg");
    error.textContent = "";

    const pw1 = document.getElementById("password").value;
    const pw2 = document.getElementById("password2").value;
    if (pw1 !== pw2) {
      error.textContent = "Les mots de passe ne correspondent pas.";
      return;
    }

    try {
      window.UC_AUTH.registerUser({
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        password: pw1,
        role: document.getElementById("role").value
      });
      window.location.href = "index.html";
    } catch (err) {
      error.textContent = err.message || "Erreur d'inscription.";
    }
  });
</script>
</body>
</html>
